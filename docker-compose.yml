version: "3.8"

services:
  app:
    build: .
    container_name: cqa-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      # CẦN THÊM: Nếu code Golang/NodeJS của bạn dùng biến toàn cục như DATABASE_URL
      # thay vì đọc lẻ DB_HOST, bạn phải ghi đè nó ở đây để chặn IP cũ. Ví dụ:
      # - DATABASE_URL=mysql://${DB_USER:-cqa}:${DB_PASSWORD}@db:3306/${DB_NAME:-cqa}?parseTime=true
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqa/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cqa-app.rule=Host(`chat.matbaohosting.com`)
      - traefik.http.routers.cqa-app.entrypoints=web,websecure
      - traefik.http.services.cqa-app.loadbalancer.server.port=8080
    networks:
      - dokploy-network
      - internal-network # Giao tiếp nội bộ với DB

  db:
    image: mysql:8.0
    container_name: cqa-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-cqa}
      MYSQL_USER: ${DB_USER:-cqa}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      # Cập nhật: Thêm user/pass để tránh false-positive khi check health
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - internal-network # Cô lập DB, không expose ra mạng ngoài

volumes:
  mysql_data:
  file_storage:

networks:
  dokploy-network:
    external: true
  internal-network: # Mạng nội bộ chuyên dụng cho App và DB
    driver: bridge
