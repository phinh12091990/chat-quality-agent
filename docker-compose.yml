version: "3.8"

services:
  app:
    build: .
    container_name: cqa-app
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_PORT=3306
      - TZ=Asia/Ho_Chi_Minh
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - file_storage:/var/lib/cqa/files
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.cqa-app.rule=Host(`chat.matbaohosting.com`)
      - traefik.http.routers.cqa-app.entrypoints=web,websecure
      - traefik.http.services.cqa-app.loadbalancer.server.port=8080
    networks:
      - dokploy-network
      - internal

  db:
    image: mysql:8.0.33
    container_name: cqa-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-cqa}
      MYSQL_USER: ${DB_USER:-cqa}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Ho_Chi_Minh
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - internal

volumes:
  mysql_data:
  file_storage:

networks:
  dokploy-network:
    external: true
  internal:
    driver: bridge
